<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MURAT Aİ ZIPLATAN</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="chat-container">
        <header class="chat-header">
            <h1>MURAT Aİ ZIPLATAN</h1>
            <p class="status">● Çevrimiçi</p>
        </header>

        <div class="chat-box" id="chatBox">
            <div class="message ai-message">
                Merhaba! Ben <b>MURAT Aİ ZIPLATAN</b>. Sizi nasıl kışkırkıyım, ucube beyin yoksunu?!*
            </div>
        </div>

        <div class="input-area">
            <input type="text" id="userInput" placeholder="Mesajınızı yazın..." onkeydown="handleKeyPress(event)">
            <button onclick="sendMessage()">Gönder</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
